        <span>NOS NIKES VOMERO À -47% AUJOURD'HUI</span>
        <span style={{ background:"#000", color:A, padding:"4px 14px", fontSize:11, letterSpacing:2, cursor:"pointer", fontWeight:800 }}

          VOIR L'OFFRE →
        </span>
        <span>🔥</span>
      </div>

      {/* HEADER */}

              <div style={{ position:"absolute", top:"100%", left:"50%", transform:"translateX(-50%)", background:C.dark, border:`1px solid ${C.border}`, borderTop:`2px solid ${A}`, padding:16, width:400, zIndex:99, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:4 }}>
                {VENDORS.map(v=>(
                  <div key={v} onClick={()=>{openCollection(v);setMegaOpen(false);}} style={{ padding:"8px 10px", cursor:"pointer", fontSize:12, fontWeight:700, textTransform:"uppercase", color:"#ccc", letterSpacing:1 }}
                    onMouseEnter={e=>e.currentTarget.style.color=A} onMouseLeave={e=>e.currentTarget.style.color="#ccc"}>{v}</div>
                ))}
              </div>
            )}
          </div>
          {[["Homme",()=>{setFilter("homme");setView("catalogue");}],["Femme",()=>{setFilter("femme");setView("catalogue");}],["Soldes",()=>{setFilter("promo");setView("catalogue");}],["Tout voir",()=>{setFilter("all");setView("catalogue");}]].map(([l,fn])=>(
            <button key={l} style={{ ...tab(false), border:"none", color:C.muted, background:"none", cursor:"pointer", fontSize:12 }} onClick={fn}>{l}</button>
          ))}
        </div>
        <button style={{ background:A, color:"#000", border:"none", padding:"8px 14px", fontWeight:700, fontSize:11, cursor:"pointer", display:"flex", alignItems:"center", gap:8 }} onClick={()=>setCartOpen(true)}>
          🛒 {cartCount>0 && <span style={{ background:"#000", color:A, borderRadius:"50%", width:18, height:18, fontSize:10, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center" }}>{cartCount}</span>}
        </button>
      </div>

      {/* HOME */}
      {view==="home" && (
        <>
          <div style={{ background:"linear-gradient(135deg,#141414 0%,#0A0A0A 100%)", padding:"64px 24px 48px", position:"relative", overflow:"hidden" }}>
            <div style={{ position:"absolute", inset:0, backgroundImage:"linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px)", backgroundSize:"60px 60px" }} />
            <div style={{ position:"relative", zIndex:1 }}>
              <div style={{ display:"inline-block", background:"rgba(232,255,0,0.1)", border:"1px solid rgba(232,255,0,0.3)", color:A, fontSize:10, fontWeight:700, letterSpacing:3, textTransform:"uppercase", padding:"5px 12px", marginBottom:20 }}>✦ Collection Printemps 2026</div>
              <h1 style={{ fontWeight:900, fontSize:52, lineHeight:1, textTransform:"uppercase", marginBottom:16 }}>COUREZ PLUS <span style={{ color:A }}>VITE.</span><br /><span style={{ WebkitTextStroke:"1px rgba(255,255,255,0.25)", color:"transparent" }}>PLUS LOIN.</span></h1>
              <p style={{ color:C.muted, fontSize:14, lineHeight:1.7, maxWidth:400, marginBottom:32 }}>25 modèles — Nike, New Balance, Asics, ON, Salomon, Vomero Plus et plus encore.</p>
              <button style={{ background:A, color:"#000", border:"none", padding:"13px 28px", fontWeight:700, fontSize:12, letterSpacing:2, textTransform:"uppercase", cursor:"pointer" }} onClick={()=>setView("catalogue")}>Voir les produits</button>
              <div style={{ display:"flex", gap:40, marginTop:40, paddingTop:32, borderTop:`1px solid ${C.border}` }}>
                {[["269+","Modèles"],["10","Marques"],["60j","Garantie retour"]].map(([v,l])=>(
                  <div key={l}><div style={{ fontWeight:900, fontSize:36, color:A, lineHeight:1 }}>{v}</div><div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginTop:2 }}>{l}</div></div>
                ))}
              </div>
            </div>
          </div>

          <div style={{ padding:"48px 24px 0" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20 }}>
              <div style={{ fontWeight:900, fontSize:28, textTransform:"uppercase" }}>NOS <span style={{ color:A }}>COLLECTIONS</span></div>
              <button style={{ background:"none", border:"none", color:C.muted, fontSize:11, fontWeight:700, letterSpacing:1, textTransform:"uppercase", cursor:"pointer", borderBottom:`1px solid ${C.border}` }} onClick={()=>setView("collections")}>Tout voir →</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))", gap:2, marginBottom:48 }}>
              {VENDORS.map(v=>{
                const img = PRODUCTS.find(p=>p.vendor===v)?.images[0];
                return (
                  <div key={v} style={{ position:"relative", aspectRatio:"2/3", overflow:"hidden", cursor:"pointer", background:C.gray }} onClick={()=>openCollection(v)}>
                    {img && <img src={img} alt={v} style={{ width:"100%", height:"100%", objectFit:"cover", opacity:0.6 }} />}
                    <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%)" }} />
                    <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:12 }}>
                      <div style={{ fontWeight:900, fontSize:16, textTransform:"uppercase" }}>{v}</div>
                      <div style={{ fontSize:10, color:A, fontWeight:700, marginTop:2 }}>{PRODUCTS.filter(p=>p.vendor===v).length} produits</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", border:`1px solid ${C.border}`, margin:"0 24px" }}>
            {[["🚀","Livraison rapide","Offerte en 5 jours"],["🔄","Retour facile","Garantie 60 jours"],["🔒","Paiement sécurisé","Service client CH"],["🏆","Expert Running","Conseils perso"]].map(([ic,t,d])=>(
              <div key={t} style={{ padding:"28px 20px", borderRight:`1px solid ${C.border}`, textAlign:"center" }}>
                <div style={{ fontSize:24, marginBottom:8 }}>{ic}</div>
                <div style={{ fontWeight:700, fontSize:14, textTransform:"uppercase", marginBottom:4, color:C.off }}>{t}</div>
                <div style={{ fontSize:12, color:C.muted }}>{d}</div>
              </div>
            ))}
          </div>
          <PageBottom {...bp} />
        </>
      )}

      {/* COLLECTIONS */}
      {view==="collections" && (
        <>
          <div style={{ padding:"32px 24px 0", background:C.dark, borderBottom:`1px solid ${C.border}` }}>
            <h1 style={{ fontWeight:900, fontSize:40, textTransform:"uppercase", paddingBottom:24 }}>
              {collVendor ? <span style={{ color:A }}>{collVendor}</span> : <>TOUTES LES <span style={{ color:A }}>COLLECTIONS</span></>}
            </h1>
          </div>
          {!collVendor ? (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:2, padding:"0 24px 48px" }}>
              {VENDORS.map(v=>{
                const img = PRODUCTS.find(p=>p.vendor===v)?.images[0];
                return (
                  <div key={v} style={{ position:"relative", aspectRatio:"2/3", overflow:"hidden", cursor:"pointer", background:C.gray }} onClick={()=>setCollVendor(v)}>
                    {img && <img src={img} alt={v} style={{ width:"100%", height:"100%", objectFit:"cover", opacity:0.6 }} />}
                    <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%)" }} />
                    <div style={{ position:"absolute", bottom:0, padding:16 }}>
                      <div style={{ fontWeight:900, fontSize:22, textTransform:"uppercase" }}>{v}</div>
                      <div style={{ fontSize:11, color:A, fontWeight:700, marginTop:4 }}>{PRODUCTS.filter(p=>p.vendor===v).length} produits →</div>
                    </div>
                  </div>
                );
              })}
            </div>
          ) : (
            <>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", padding:"20px 24px" }}>
                {["all","homme","femme","promo"].map(f=>(
                  <button key={f} style={tab(filter===f)} onClick={()=>setFilter(f)}>{f==="all"?"Tout":f==="homme"?"Homme":f==="femme"?"Femme":"🏷 Soldes"}</button>
                ))}
                <button style={{ ...tab(false), marginLeft:"auto" }} onClick={()=>setCollVendor(null)}>← Toutes les marques</button>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:2, padding:"0 24px" }}>
                {PRODUCTS.filter(p=>p.vendor===collVendor&&(filter==="all"||(filter==="homme"&&(p.category==="Homme"||p.category==="Unisexe"))||(filter==="femme"&&(p.category==="Femme"||p.category==="Unisexe"))||(filter==="promo"&&p.isPromo))).map((p,i)=>(
                  <ProductCard key={i} p={p} idx={`coll-${i}`} />
                ))}
              </div>
            </>
          )}
          <div style={{ height:48 }} />
          <PageBottom {...bp} />
        </>
      )}

      {/* CATALOGUE */}
      {view==="catalogue" && (
        <>
          <div style={{ padding:"32px 24px 0", background:C.dark, borderBottom:`1px solid ${C.border}` }}>
            <h1 style={{ fontWeight:900, fontSize:40, textTransform:"uppercase", paddingBottom:24 }}>CATALOGUE <span style={{ color:A }}>COMPLET</span></h1>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", padding:"16px 24px" }}>
            {[["all","Tout"],["homme","Homme"],["femme","Femme"],["unisexe","Unisexe"],...VENDORS.map(v=>[v,v]),["promo","🏷 Soldes"]].map(([f,l])=>(
              <button key={f} style={tab(filter===f)} onClick={()=>setFilter(f)}>{l}</button>
            ))}
          </div>
          <div style={{ padding:"0 24px 8px", color:C.muted, fontSize:12 }}>{filtered.length} produit{filtered.length>1?"s":""}</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:2, padding:"0 24px" }}>
            {filtered.map((p,i)=><ProductCard key={i} p={p} idx={i} />)}
          </div>
          {filtered.length===0 && <div style={{ textAlign:"center", padding:"80px 0", color:C.muted }}><div style={{ fontWeight:900, fontSize:24, textTransform:"uppercase", marginBottom:8 }}>Aucun résultat</div></div>}
          <div style={{ height:48 }} />
          <PageBottom {...bp} />
        </>
      )}

      {/* PRODUCT */}
      {view==="product" && activeProduct && (
        <>
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"20px 24px 0", fontSize:12, color:C.muted, cursor:"pointer", letterSpacing:1, textTransform:"uppercase" }} onClick={()=>setView("catalogue")}>← Retour au catalogue</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:40, padding:"24px 24px 32px" }}>
            <div>
              <div style={{ background:C.gray, aspectRatio:"1/1", overflow:"hidden", marginBottom:8 }}>
                <img src={activeProduct.images[mainImg]} alt={activeProduct.title} style={{ width:"100%", height:"100%", objectFit:"cover" }} />
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {activeProduct.images.map((img,i)=>(
                  <div key={i} style={{ width:60, height:60, background:C.gray, overflow:"hidden", cursor:"pointer", border:`2px solid ${mainImg===i?A:"transparent"}` }} onClick={()=>setMainImg(i)}>
                    <img src={img} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />
                  </div>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:A, letterSpacing:3, textTransform:"uppercase", marginBottom:8, cursor:"pointer" }} onClick={()=>openCollection(activeProduct.vendor)}>{activeProduct.vendor}</div>
              <h1 style={{ fontWeight:900, fontSize:32, textTransform:"uppercase", lineHeight:1, marginBottom:16 }}>{activeProduct.title}</h1>
              <div style={{ display:"flex", gap:8, marginBottom:20, flexWrap:"wrap" }}>
                {activeProduct.isNew && <span style={{ background:A, color:"#000", fontSize:10, fontWeight:800, padding:"4px 10px", textTransform:"uppercase" }}>Nouveau</span>}
                {activeProduct.isPromo && <span style={{ background:C.red, color:C.white, fontSize:10, fontWeight:800, padding:"4px 10px", textTransform:"uppercase" }}>En solde</span>}
                <span style={{ border:`1px solid ${C.border}`, color:C.muted, fontSize:10, padding:"4px 10px", textTransform:"uppercase" }}>{activeProduct.category}</span>
              </div>
              <div style={{ display:"flex", alignItems:"baseline", gap:12, marginBottom:24, paddingBottom:24, borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontWeight:900, fontSize:36 }}>{activeProduct.price.toFixed(2)}$</span>
                {activeProduct.compare>0 && <span style={{ fontSize:20, color:C.muted, textDecoration:"line-through" }}>{activeProduct.compare.toFixed(2)}$</span>}
                {activeProduct.compare>0 && <span style={{ background:C.red, color:C.white, fontSize:12, fontWeight:700, padding:"3px 10px" }}>-{disc(activeProduct)}%</span>}
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10, margin:"20px 0", paddingBottom:20, borderBottom:`1px solid ${C.border}` }}>
                {[["🚀","Livraison offerte en 5 jours"],["🔄","Garantie retour 60 jours"],["🔒","Service client suisse"]].map(([ic,t])=>(
                  <div key={t} style={{ display:"flex", gap:10, fontSize:13, color:C.muted, alignItems:"center" }}><span style={{ fontSize:18 }}>{ic}</span><span>{t}</span></div>
                ))}
              </div>

              {activeProduct.vendor === "Vomero Plus" ? (
                <button style={{ width:"100%", background:A, color:"#000", border:"none", padding:16, fontWeight:800, fontSize:13, letterSpacing:2, textTransform:"uppercase", cursor:"pointer", marginBottom:10 }}
                  onClick={() => window.open(buildAffiliateUrl(activeProduct), '_blank')}>
                  🛒 Ajouter au panier
                </button>
              ) : (
                <button style={{ width:"100%", background:A, color:"#000", border:"none", padding:16, fontWeight:800, fontSize:13, letterSpacing:2, textTransform:"uppercase", cursor:"pointer", marginBottom:10 }} onClick={()=>addToCart(activeProduct)}>🛒 Ajouter au panier</button>
              )}

              {DESCRIPTIONS[`${activeProduct.title}||${activeProduct.category}`] && (
                <div style={{ marginTop:28, paddingTop:24, borderTop:`1px solid ${C.border}` }}>
                  <div style={{ fontWeight:800, fontSize:12, textTransform:"uppercase", letterSpacing:2, color:A, marginBottom:16 }}>Description du produit</div>
                  <style>{`.pd-desc h2{font-size:17px;font-weight:900;text-transform:uppercase;color:#F0F0F0;margin:0 0 12px;line-height:1.2;}.pd-desc h3{font-size:12px;font-weight:800;text-transform:uppercase;color:#E8FF00;letter-spacing:1px;margin:20px 0 10px;}.pd-desc p{margin:0 0 10px;color:rgba(255,255,255,0.72);font-size:13px;line-height:1.8;}.pd-desc ul{padding:0;list-style:none;margin:0 0 12px;display:flex;flex-direction:column;gap:0;}.pd-desc li{font-size:13px;color:rgba(255,255,255,0.7);padding:7px 0;border-bottom:1px solid #2A2A2A;}.pd-desc hr{border:none;border-top:1px solid #2A2A2A;margin:20px 0;}.pd-desc strong{color:#F0F0F0;}`}</style>
                  <div className="pd-desc" dangerouslySetInnerHTML={{ __html: DESCRIPTIONS[`${activeProduct.title}||${activeProduct.category}`] }} />
                </div>
              )}

              <div style={{ paddingTop:20, borderTop:`1px solid ${C.border}`, marginTop:20 }}>
                <ReviewsCarousel mini={true} />
              </div>
            </div>
          </div>

          <div style={{ padding:"0 24px 32px" }}>
            <div style={{ fontWeight:900, fontSize:22, textTransform:"uppercase", marginBottom:16 }}>VOUS AIMEREZ <span style={{ color:A }}>AUSSI</span></div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:2 }}>
              {PRODUCTS.filter(p=>p!==activeProduct&&(p.vendor===activeProduct.vendor||p.category===activeProduct.category)).slice(0,4).map((p,i)=>(
                <ProductCard key={i} p={p} idx={`rel-${i}`} />
              ))}
            </div>
          </div>
          <PageBottom {...bp} />
        </>
      )}

      {/* CART */}
      {cartOpen && (
        <>
          <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:100, backdropFilter:"blur(4px)" }} onClick={()=>setCartOpen(false)} />
          <div style={{ position:"fixed", top:0, right:0, width:380, height:"100%", background:C.dark, borderLeft:`1px solid ${C.border}`, zIndex:101, display:"flex", flexDirection:"column", padding:24 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20, paddingBottom:16, borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontWeight:900, fontSize:22, textTransform:"uppercase" }}>Mon panier</div>
              <button onClick={()=>setCartOpen(false)} style={{ background:"none", border:`1px solid ${C.border}`, color:C.white, width:34, height:34, cursor:"pointer", fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>
            <div style={{ flex:1, overflowY:"auto" }}>
              {cart.length===0 ? <p style={{ color:C.muted, textAlign:"center", padding:"48px 0" }}>Votre panier est vide</p>
              : cart.map((item,i)=>(
                <div key={i} style={{ display:"flex", gap:12, padding:"14px 0", borderBottom:`1px solid ${C.border}` }}>
                  <div style={{ width:70, height:70, background:C.gray, overflow:"hidden", flexShrink:0 }}>
                    {item.images?.[0] && <img src={item.images[0]} alt="" style={{ width:"100%", height:"100%", objectFit:"cover" }} />}
                  </div>
                  <div>
                    <div style={{ fontSize:10, color:A, fontWeight:700, textTransform:"uppercase", letterSpacing:2 }}>{item.vendor}</div>
                    <div style={{ fontWeight:700, fontSize:14, textTransform:"uppercase", margin:"2px 0 4px" }}>{item.title}</div>
                    <div style={{ fontSize:14, fontWeight:600 }}>{(item.price*item.qty).toFixed(2)}$</div>
                    <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:6 }}>
                      {[-1,1].map(d=>(
                        <button key={d} onClick={()=>changeQty(i,d)} style={{ width:24, height:24, border:`1px solid ${C.border}`, background:"none", color:C.white, cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>{d===-1?"−":"+"}</button>
                      ))}
                      <span style={{ fontSize:13 }}>{item.qty}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ marginTop:16, paddingTop:16, borderTop:`1px solid ${C.border}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontWeight:900, fontSize:20, textTransform:"uppercase", marginBottom:12 }}>
                <span>Total</span><span>{cartTotal.toFixed(2)}$</span>
              </div>
              <button style={{ background:A, color:"#000", border:"none", display:"block", width:"100%", padding:16, fontWeight:700, fontSize:12, letterSpacing:2, textTransform:"uppercase", cursor:"pointer" }}>Commander →</button>
            </div>
          </div>
        </>
      )}

      {/* AFFILIATE IFRAME OVERLAY */}
      {affiliateUrl && (
        <div style={{ position:"fixed", inset:0, zIndex:300, display:"flex", flexDirection:"column" }}>
          <div style={{ background:C.dark, borderBottom:`2px solid ${A}`, padding:"12px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ fontWeight:900, fontSize:16, textTransform:"uppercase", letterSpacing:1 }}>Fradette <span style={{ color:A }}>Sport</span></div>
              <div style={{ fontSize:12, color:C.muted }}>— Partenaire officiel</div>
            </div>
            <button onClick={() => setAffiliateUrl(null)}
              style={{ background:"none", border:`1px solid ${C.border}`, color:C.white, padding:"8px 16px", cursor:"pointer", fontSize:12, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>
              ✕ Fermer
            </button>
          </div>
          <iframe src={affiliateUrl} style={{ flex:1, border:"none", width:"100%", background:C.bg }} title="Commande partenaire" />
        </div>
      )}

      {/* LEGAL MODAL */}
      {legalPage && LEGAL[legalPage] && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", zIndex:200, backdropFilter:"blur(6px)", display:"flex", alignItems:"center", justifyContent:"center" }} onClick={()=>setLegalPage(null)}>
          <div style={{ background:C.dark, border:`1px solid ${C.border}`, borderTop:`3px solid ${A}`, width:"min(640px,92vw)", maxHeight:"80vh", display:"flex", flexDirection:"column" }} onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"20px 24px", borderBottom:`1px solid ${C.border}` }}>
              <div style={{ fontWeight:900, fontSize:20, textTransform:"uppercase" }}>{LEGAL[legalPage].title}</div>
              <button onClick={()=>setLegalPage(null)} style={{ background:"none", border:`1px solid ${C.border}`, color:C.white, width:32, height:32, cursor:"pointer", fontSize:16 }}>✕</button>
            </div>
            <div style={{ overflowY:"auto", padding:24, color:"rgba(255,255,255,0.75)", fontSize:13, lineHeight:1.9, whiteSpace:"pre-line" }}>{LEGAL[legalPage].body}</div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FradetteSport />);
  </script>
